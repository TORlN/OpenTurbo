name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      CMAKE_ARGS: -DOPENTURBO_BUILD_CUDA=OFF
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11']
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install .
      - name: Run tests
        run: |
          pytest -q

  windows-cuda-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.24
        with:
          cuda: '12.6.3'
          method: 'network'
      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Build editable CUDA bindings
        shell: cmd
        run: scripts\install_cuda_bindings.bat
      - name: Run tests
        run: |
          pytest -q
