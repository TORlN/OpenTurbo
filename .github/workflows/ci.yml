name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      run_windows_cuda:
        description: Run the Windows CUDA build on a self-hosted CUDA runner
        required: false
        default: false
        type: boolean

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      CMAKE_ARGS: -DOPENTURBO_BUILD_CUDA=OFF
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[test]
      - name: Run tests
        run: |
          pytest -q

  windows-test:
    runs-on: windows-latest
    env:
      CMAKE_ARGS: -DOPENTURBO_BUILD_CUDA=OFF
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[test]
      - name: Run tests
        run: |
          pytest -q

  windows-cuda-build:
    if: github.event_name == 'workflow_dispatch' && inputs.run_windows_cuda
    runs-on: [self-hosted, windows, x64, cuda]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[test]
      - name: Build editable CUDA bindings
        shell: cmd
        run: scripts\install_cuda_bindings.bat
      - name: Run tests
        run: |
          pytest -q
